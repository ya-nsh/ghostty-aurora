<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Ghostty Aurora preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080c17"/>
      <stop offset="0.52" stop-color="#111a2e"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="auroraA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#37f0ac" stop-opacity="0"/>
      <stop offset="0.24" stop-color="#37f0ac" stop-opacity="0.74"/>
      <stop offset="0.58" stop-color="#7b68ff" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#e56dff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M-80 170 C 120 80, 250 250, 420 150 S 760 70, 930 165 S 1140 245, 1360 120" fill="none" stroke="url(#auroraA)" stroke-width="86" filter="url(#blur)"/>
  <path d="M-60 285 C 160 180, 330 330, 520 230 S 820 160, 1040 260 S 1210 320, 1360 235" fill="none" stroke="#48f5c2" stroke-opacity="0.24" stroke-width="58" filter="url(#blur)"/>
  <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="30">
    <text x="70" y="92" fill="#b6f4d7"># Ghostty Aurora</text>
    <text x="70" y="150" fill="#d8deef">custom-shader = /path/to/ghostty-aurora/aurora.glsl</text>
    <text x="70" y="202" fill="#d8deef">custom-shader-animation = true</text>
    <text x="70" y="306" fill="#f3cda7">morning -&gt; soft light waves</text>
    <text x="70" y="358" fill="#b9b6ff">evening -&gt; purple / blue aurora</text>
    <text x="70" y="410" fill="#82e5c6">night   -&gt; darker low-motion glow</text>
    <text x="70" y="540" fill="#8d98b8">~/code/ghostty-aurora main $ vim aurora.glsl</text>
  </g>
</svg>
